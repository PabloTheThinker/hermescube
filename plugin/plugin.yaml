name: hermescube
manifest_version: 1
version: "0.3.7"
description: >-
  Local holographic .cube memory for Hermes Agent — HAR retrieval,
  MemoryProvider plugin. Per-user cube at $HERMES_HOME/memories/memory.cube.
author: PabloTheThinker
license: MIT
homepage: https://github.com/PabloTheThinker/hermescube
platforms: [linux, macos, windows]

requires:
  python: ">=3.11"

# Memory provider discovery scans $HERMES_HOME/plugins/<name>/ for MemoryProvider
# Activation: memory.provider: hermescube  in $HERMES_HOME/config.yaml

config:
  auto_extract:
    description: Auto-extract facts from conversations at session end
    type: bool
    default: false
  query_rewrite:
    description: >-
      LLM query rewrite before HAR (slow; off by default).
      Env: HERMESCUBE_QUERY_REWRITE=1
    type: bool
    default: false
  dim:
    description: HRR vector dimension
    type: int
    default: 256
  l2_buckets:
    description: Number of L2 topic buckets
    type: int
    default: 64
  char_limit:
    description: Maximum characters per memory entry
    type: int
    default: 2200
  evolve_interval:
    description: Auto-evolve after N entries (0 to disable)
    type: int
    default: 50
  memory_nudge_interval:
    description: Remind agent to review memory every N turns
    type: int
    default: 10

tools:
  - hermescube_search
  - hermescube_manage
  - hermescube_feedback

setup:
  type: pip
  package: hermescube
  pip_dependencies:
    - numpy
